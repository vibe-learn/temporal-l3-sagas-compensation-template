name: ci
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: tidy
        run: go mod tidy
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -v ./...
